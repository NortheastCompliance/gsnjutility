<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSM Utility — New Jersey Utility Bill Reference </title>
  <style>
    :root {
      --blue-dark:    #0C3B6E;
      --blue-mid:     #185FA5;
      --blue-light:   #E6F1FB;
      --teal:         #0E7490;
      --teal-light:   #E0F5F9;
      --green:        #166534;
      --green-light:  #DCFCE7;
      --gray-dark:    #2C2C2A;
      --gray-mid:     #5F5E5A;
      --gray-light:   #F1EFE8;
      --gray-border:  #D3D1C7;
      --white:        #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--gray-light); color: var(--gray-dark); min-height: 100vh; }

    header { background: var(--blue-dark); padding: 0 2rem; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 72px; }
    .logo-img { height: 32px; width: auto; display: block; mix-blend-mode: screen; }

    .hero { background: var(--blue-mid); color: var(--white); padding: 2.5rem 2rem 2rem; }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero h1 { font-size: clamp(20px, 4vw, 30px); font-weight: 600; margin-bottom: 8px; white-space: nowrap; }
    .hero p { font-size: 15px; opacity: .85; line-height: 1.6; margin-bottom: 1.5rem; white-space: nowrap; }
    .search-bar input { padding: 10px 16px; border: 1.5px solid rgba(255,255,255,.3); border-radius: 8px; background: rgba(255,255,255,.12); color: var(--white); font-size: 14px; outline: none; width: 340px; max-width: 100%; }
    .search-bar input::placeholder { color: rgba(255,255,255,.55); }
    .search-bar input:focus { border-color: rgba(255,255,255,.7); }

    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .section-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue-mid); flex-shrink: 0; }
    .section-header h2 { font-size: 16px; font-weight: 600; }
    .section-header .count { font-size: 12px; background: var(--gray-light); border: 1px solid var(--gray-border); border-radius: 12px; padding: 2px 10px; color: var(--gray-mid); margin-left: auto; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; margin-bottom: 2.5rem; }

    .doc-card { background: var(--white); border: 1px solid var(--gray-border); border-radius: 10px; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 10px; transition: box-shadow .15s, border-color .15s; }
    .doc-card:hover { border-color: var(--blue-mid); box-shadow: 0 2px 12px rgba(24,95,165,.12); }

    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .card-icon { width: 36px; height: 36px; border-radius: 7px; background: var(--blue-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon svg { width: 18px; height: 18px; }
    .card-info { flex: 1; min-width: 0; }
    .card-info h3 { font-size: 14px; font-weight: 600; color: var(--gray-dark); line-height: 1.35; }
    .card-info .address { font-size: 12px; color: var(--gray-mid); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info .county { font-size: 11px; color: var(--blue-mid); font-weight: 600; margin-top: 3px; }

    .bill-links { display: flex; flex-direction: column; gap: 7px; border-top: 1px solid var(--gray-border); padding-top: 10px; }
    .bill-row { display: flex; flex-direction: row; align-items: center; gap: 8px; }
    .bill-label { font-size: 11px; font-weight: 600; border-radius: 4px; padding: 3px 9px; white-space: nowrap; display: inline-block; min-width: 155px; flex-shrink: 0; }
    .bill-label.water   { background: var(--blue-light);  color: var(--blue-dark); }
    .bill-label.sewer   { background: var(--teal-light);  color: var(--teal); }
    .bill-label.monthly { background: var(--green-light); color: var(--green); }

    .btn-combined { flex: 1; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; background: var(--blue-mid); color: var(--white); border: 1px solid var(--blue-mid); display: inline-flex; align-items: center; justify-content: center; gap: 5px; transition: background .12s; width: 100%; }
    .btn-combined:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .btn-combined a { color: var(--white); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .divider { color: rgba(255,255,255,0.5); font-size: 12px; margin: 0 2px; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray-mid); display: none; }
    .empty-state p { font-size: 14px; margin-top: 8px; }

    footer { background: var(--blue-dark); color: rgba(255,255,255,.6); text-align: center; padding: 1.25rem 2rem; font-size: 12px; margin-top: 2rem; }
    footer strong { color: var(--white); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 12px; width: 100%; max-width: 900px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-border); gap: 1rem; }
    .modal-title { font-size: 14px; font-weight: 600; color: var(--gray-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-close { width: 32px; height: 32px; border-radius: 6px; background: var(--gray-light); border: 1px solid var(--gray-border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--gray-mid); flex-shrink: 0; }
    .modal-close:hover { background: var(--gray-border); }
    .modal iframe { flex: 1; border: none; width: 100%; }

    @media (max-width: 600px) {
      main { padding: 1.25rem; }
      .card-grid { grid-template-columns: 1fr; }
      .search-bar input { width: 100%; }
      .hero p { white-space: normal; }
      .bill-row { flex-direction: column; align-items: flex-start; }
      .btn-combined { width: 100%; }
    }
  </style>
</head>

  function makeRow(label, cls, file, title) {
    return `
      <div class="bill-row">
        <span class="bill-label ${cls}">${label}</span>
        <button class="btn-combined" onclick="openPDF('${file}', '${title}')">
          ${viewSvg} View
          <span class="divider">|</span>
          <a href="${file}" download target="_blank" onclick="event.stopPropagation()">${dlSvg} Download</a>
        </button>
      </div>`;
  }

  function buildCard(doc) {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.dataset.name = doc.name.toLowerCase();
    card.innerHTML = `
      <div class="card-top">
        <div class="card-icon">${docIcon}</div>
        <div class="card-info">
          <h3>${doc.name}</h3>
          ${doc.address ? `<div class="address">${doc.address}</div>` : ''}
          <div class="county">📍 ${doc.county}</div>
        </div>
      </div>
      <div class="bill-links">
        ${makeRow('💧 Water Avg/Low/High', 'water',   doc.waterFile,   doc.name + ' — Water Bill')}
        ${makeRow('🌊 Sewer Avg/Low/High', 'sewer',   doc.sewerFile,   doc.name + ' — Sewer Bill')}
        ${makeRow('📄 Monthly Property Bill', 'monthly', doc.monthlyFile, doc.name + ' — Monthly Bill')}
      </div>
    `;
    return card;
  }

  function renderAll(query = '') {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';
    let count = 0;
    documents.forEach(doc => {
      if (query && !doc.name.toLowerCase().includes(query)) return;
      grid.appendChild(buildCard(doc));
      count++;
    });
    document.getElementById('propCount').textContent = count;
    document.getElementById('emptyState').style.display = count === 0 ? 'block' : 'none';
  }

  function openPDF(file, title) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalFrame').src = file;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modalClose').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modalFrame').src = '';
    document.body.style.overflow = '';
  });

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) document.getElementById('modalClose').click();
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    renderAll(e.target.value.toLowerCase());
  });

  renderAll();
